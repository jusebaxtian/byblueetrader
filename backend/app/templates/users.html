<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>ByblueTrader Admin — Usuarios</title>
  <style>
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
  </style>
</head>
<body>
  <h1>Usuarios y licencias</h1>
  <form method="post" action="/admin/logout"><button type="submit">Salir</button></form>

  <h2>Nuevo usuario / licencia</h2>
  <form method="post" action="/admin/users">
    <label>Email IQ Option <input type="email" name="iq_email" required></label>
    <label>Plan <input type="text" name="plan" value="monthly"></label>
    <label>Vence <input type="datetime-local" name="expires_at" required></label>
    <button type="submit">Crear</button>
  </form>

  <h2>Listado</h2>
  <table>
    <tr>
      <th>Email</th><th>Estado</th><th>Plan</th><th>Vence</th><th>Acciones</th>
    </tr>
    {% for u in users %}
    <tr>
      <td>{{ u.iq_email }}</td>
      <td>{{ u.status }}</td>
      <td>{{ u.plan or "" }}</td>
      <td>{{ u.expires_at or "" }}</td>
      <td>
        <form method="post" action="/admin/users/{{ u.id }}/status" style="display:inline">
          <input type="hidden" name="status" value="{{ 'inactive' if u.status == 'active' else 'active' }}">
          <button type="submit">{{ 'Desactivar' if u.status == 'active' else 'Activar' }}</button>
        </form>
        <form method="post" action="/admin/users/{{ u.id }}/expires" style="display:inline">
          <input type="datetime-local" name="expires_at" required>
          <button type="submit">Extender</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
