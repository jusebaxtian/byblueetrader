# Copy this to /etc/nginx/sites-available/bot.crmbybluee.blue
# then: sudo ln -s /etc/nginx/sites-available/bot.crmbybluee.blue /etc/nginx/sites-enabled/
# Run BEFORE requesting the SSL cert (certbot rewrites this file to add the HTTPS block).

server {
    listen 80;
    server_name bot.crmbybluee.blue;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
